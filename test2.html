<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT Task Management System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Inter',sans-serif;
}

body{
    background:#1f2937;
    min-height:100vh;
    color:#fff;
}

.wrapper{
    display:flex;
    min-height:100vh;
}

/* =======================
   LEFT PANEL
======================= */

.sidebar{
    width:280px;
    background:#111827;
    border-right:1px solid #334155;
    padding:30px 20px;
}

.system-title{
    background:linear-gradient(135deg,#06b6d4,#2563eb);
    color:#fff;
    font-size:24px;
    font-weight:700;
    text-align:center;
    padding:30px 20px;
    border-radius:20px;
    margin-bottom:30px;
    box-shadow:0 10px 25px rgba(37,99,235,.25);
}

.menu-item{
    padding:18px;
    margin-bottom:12px;
    border-radius:14px;
    color:#cbd5e1;
    font-weight:600;
    transition:.3s;
    cursor:pointer;
}

.menu-item:hover{
    background:#1e293b;
}

.menu-item.active{
    background:#0ea5e9;
    color:white;
}

/* =======================
   CONTENT
======================= */

.main-content{
    flex:1;
    padding:40px;
}

.card{
    background:#07132d;
    border-radius:22px;
    overflow:hidden;
    border:1px solid #223455;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.card-header{
    background:#16b5de;
    color:white;
    font-size:20px;
    font-weight:700;
    padding:22px 28px;
}

.card-body{
    padding:28px;
}

/* =======================
   FORM
======================= */

.form-grid{
    display:grid;
    grid-template-columns:
    repeat(4,1fr);
    gap:24px;
    align-items:start;
}

.form-group{
    display:flex;
    flex-direction:column;
}

.form-group label{
    color:#fff;
    margin-bottom:10px;
    font-size:14px;
    font-weight:500;
}

input,
select,
textarea{
    width:100%;
    background:#1e2d4a;
    border:1px solid #415675;
    color:white;
    border-radius:16px;
    padding:16px;
    font-size:15px;
}

input:focus,
select:focus,
textarea:focus{
    outline:none;
    border-color:#16b5de;
}

textarea{
    min-height:125px;
    resize:none;
}

/* =======================
   ATTACHMENT
======================= */

.attachment{
    margin-top:30px;
}

.attachment input{
    background:#1e2d4a;
    padding:14px;
}

/* =======================
   BUTTON
======================= */

.btn-container{
    text-align:center;
    margin-top:30px;
}

.add-btn{
    border:none;
    background:linear-gradient(
        135deg,
        #16b5de,
        #3b82f6
    );
    color:white;
    padding:16px 50px;
    border-radius:14px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.add-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(59,130,246,.4);
}

/* =======================
   TABLE
======================= */

.task-table{
    margin-top:30px;
    background:#07132d;
    border-radius:22px;
    overflow:hidden;
    border:1px solid #223455;
}

.table-header{
    background:#16b5de;
    padding:22px 28px;
    font-size:18px;
    font-weight:700;
}

table{
    width:100%;
    border-collapse:collapse;
}

thead{
    background:#0b1b3d;
}

th{
    padding:18px;
    text-align:left;
    color:white;
}

td{
    padding:18px;
    border-top:1px solid #223455;
    color:#d1d5db;
}

.empty-row{
    text-align:center;
    padding:50px !important;
}

.form-grid{
    display:grid;
    grid-template-columns:
    repeat(3,1fr);
    gap:24px;
}

.full-width{
    grid-column:1 / -1;
}

textarea{
    min-height:120px;
}
/* =======================
   RESPONSIVE
======================= */

@media(max-width:1200px){

    .form-grid{
        grid-template-columns:
        repeat(2,1fr);
    }

}

@media(max-width:768px){

    .wrapper{
        flex-direction:column;
    }

    .sidebar{
        width:100%;
    }

    .main-content{
        padding:20px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

}

</style>

</head>

<body>

<div class="wrapper">

    <!-- SIDEBAR -->

   <aside class="sidebar">


    <div class="menu-item active" onclick="showPage('taskForm',this)">
        Add Task Details
    </div>

    <div class="menu-item" onclick="showPage('taskTable',this)">
        IT Task(s)
    </div>

</aside>

    <!-- MAIN CONTENT -->
<main class="main-content">

    <!-- TASK FORM -->

    <div id="taskForm">

        <div class="card">

            <div class="card-header">
                Add Task Details
            </div>

            <div class="card-body">

               <div class="form-grid">

    <div class="form-group">
        <label>Task Type</label>
        <select>
            <option>Select Task Type</option>
        </select>
    </div>

    <div class="form-group">
        <label>Assignee</label>
        <select>
            <option>Select Assignee</option>
        </select>
    </div>

    <div class="form-group">
        <label>IT Target Date</label>
        <input type="date">
    </div>

    <div class="form-group full-width">
        <label>Description</label>
        <textarea placeholder="Enter task description..."></textarea>
    </div>

</div>

                <div class="attachment">

                    <label style="display:block;margin-bottom:10px;">
                        Attachments
                    </label>

                    <input type="file">

                </div>

                <div class="btn-container">

                    <button class="add-btn">
                        Add Task
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- TASK TABLE -->

    <div id="taskTable" style="display:none;">

        <div class="task-table">

            <div class="table-header">
                My IT Task(s)
            </div>

            <table>

                <thead>

                    <tr>
                        <th>INITIATIVE TASK NO</th>
                        <th>CREATED BY</th>
                        <th>TASK TYPE</th>
                        <th>IT TARGET DATE</th>
                        <th>TASK DESCRIPTION</th>
                    </tr>

                </thead>

                <tbody>

                    <tr>
                        <td colspan="5" class="empty-row">
                            No tasks yet.
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</main>
</div>


<script>

function showPage(pageId, element){

    document.getElementById("taskForm").style.display = "none";
    document.getElementById("taskTable").style.display = "none";

    document.getElementById(pageId).style.display = "block";

    document
        .querySelectorAll(".menu-item")
        .forEach(item => {
            item.classList.remove("active");
        });

    element.classList.add("active");
}

</script>

</body>
</html>
