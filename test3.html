<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> ITPMS Virtual Assistant</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, Arial, sans-serif;
}

body{
    background:#f4f6f9;
}

/* Floating Button */

.chat-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    width:65px;
    height:65px;
    border:none;
    border-radius:50%;
    background:#005baa;
    color:white;
    font-size:30px;
    cursor:pointer;
    box-shadow:0 4px 15px rgba(0,0,0,.3);
    transition:.3s;
}

.chat-toggle:hover{
    transform:scale(1.08);
}

/* Chat Container */

.chat-container{
    position:fixed;
    right:20px;
    bottom:95px;
    width:400px;
    height:650px;
    max-height:85vh;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 15px 40px rgba(0,0,0,.15);
    display:none;
    flex-direction:column;
}

/* Header */

.chat-header{
    background:linear-gradient(135deg,#005baa,#0078d4);
    color:white;
    padding:18px;
    display:flex;
    align-items:center;
    gap:12px;
}

.bot-avatar{
    width:50px;
    height:50px;
    border-radius:50%;
    background:white;
    color:#005baa;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:26px;
    font-weight:bold;
}

.chat-header h3{
    font-size:17px;
}

.chat-header p{
    font-size:12px;
    opacity:.9;
}

/* Chat Body */

.chat-body{
    flex:1;
    overflow-y:auto;
    padding:15px;
    background:#f7f9fc;
}

/* Scrollbar */

.chat-body::-webkit-scrollbar{
    width:6px;
}

.chat-body::-webkit-scrollbar-thumb{
    background:#cfd8e6;
    border-radius:10px;
}

.message{
    max-width:85%;
    padding:12px 14px;
    margin-bottom:12px;
    border-radius:16px;
    word-wrap:break-word;
    line-height:1.4;
}

.bot{
    background:white;
    border:1px solid #e5e7eb;
}

.user{
    background:#005baa;
    color:white;
    margin-left:auto;
}

/* Image Preview */

.preview-image{
    max-width:220px;
    border-radius:10px;
    display:block;
}

/* Quick Actions */

.quick-actions{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

.quick-actions button{
    border:none;
    padding:10px 14px;
    border-radius:25px;
    background:#eef3fb;
    color:#005baa;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:.25s;
}

.quick-actions button:hover{
    background:#005baa;
    color:white;
}

/* Footer */

.chat-footer{
    display:flex;
    border-top:1px solid #ddd;
    background:white;
}

.upload-btn{
    width:55px;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    border-right:1px solid #ddd;
    font-size:20px;
}

.chat-footer input[type=text]{
    flex:1;
    border:none;
    outline:none;
    padding:14px;
    font-size:14px;
}

.send-btn{
    border:none;
    background:#005baa;
    color:white;
    padding:0 20px;
    cursor:pointer;
    transition:.3s;
}

.send-btn:hover{
    background:#00478a;
}

/* Mobile */

@media(max-width:480px){

    .chat-container{
        width:95%;
        height:90vh;
        right:2.5%;
        bottom:10px;
    }

    .quick-actions button{
        width:100%;
    }

}

</style>
</head>
<body>

<!-- Floating Button -->

<button class="chat-toggle" onclick="toggleChat()">
🤖
</button>

<!-- Chat Window -->

<div class="chat-container" id="chatContainer">

    <div class="chat-header">
        <div class="bot-avatar">🤖</div>

        <div>
            <h3>ITPMS Virtual Assistant</h3>
            <p>Online</p>
        </div>
    </div>

    <div class="chat-body" id="chatBody">

        <div class="message bot">

            👋 Welcome! How may I assist you today?

            <div class="quick-actions">

                <button onclick="askQuestion('Asset Management System')">
                    Asset Management System
                </button>

                <button onclick="askQuestion('Budget')">
                    Budget
                </button>

                <button onclick="askQuestion('Buying')">
                    Buying
                </button>

                <button onclick="askQuestion('Fleet Management System')">
                    Fleet Management System
                </button>

                <button onclick="askQuestion('Flight Scheduling System')">
                    Flight Scheduling System
                </button>

                <button onclick="askQuestion('IO Information Management System')">
                    IO Information Management System
                </button>

                <button onclick="askQuestion('IT Project Management System')">
                    IT Project Management System
                </button>

                <button onclick="askQuestion('Item Requisition and Monitoring System')">
                    Item Requisition and Monitoring System
                </button>

                <button onclick="askQuestion('Microsoft Dynamics 365 Finance and Operations')">
                    Dynamics 365 Finance & Operations
                </button>

                <button onclick="askQuestion('MS Dynamics AX 2009')">
                    MS Dynamics AX 2009
                </button>

                <button onclick="askQuestion('New Project')">
                    New Project
                </button>

            </div>

        </div>

    </div>

    <div class="chat-footer">

        <label class="upload-btn">
            📎

            <input
                type="file"
                id="fileInput"
                multiple
                hidden
                accept="image/*,.pdf,.doc,.docx,.xls,.xlsx,.txt">

        </label>

        <input
            type="text"
            id="userInput"
            placeholder="Type a message...">

        <button
            class="send-btn"
            onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

/* Open / Close Chat */

function toggleChat(){

    const chat =
        document.getElementById("chatContainer");

    if(chat.style.display === "flex"){
        chat.style.display = "none";
    }
    else{
        chat.style.display = "flex";
    }
}

/* Add Message */

function addMessage(message,type){

    const chatBody =
        document.getElementById("chatBody");

    const div =
        document.createElement("div");

    div.className =
        "message " + type;

    div.innerHTML = message;

    chatBody.appendChild(div);

    chatBody.scrollTop =
        chatBody.scrollHeight;
}

/* Quick Actions */

function askQuestion(text){

    document.getElementById("userInput").value = text;

    sendMessage();
}

/* Simple Bot Replies */

function botReply(text){

    return `
        Thank you for your inquiry regarding
        <strong>${text}</strong>.<br><br>
        Our team will assist you shortly.
    `;
}

/* Send Message */

function sendMessage(){

    const input =
        document.getElementById("userInput");

    const text =
        input.value.trim();

    if(text === "") return;

    addMessage(text,"user");

    input.value = "";

    setTimeout(function(){

        addMessage(
            botReply(text),
            "bot"
        );

    },500);
}

/* ENTER KEY */

document
.getElementById("userInput")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        sendMessage();
    }

});

/* FILE UPLOAD */

document
.getElementById("fileInput")
.addEventListener("change",function(){

    const files = this.files;

    for(let file of files){

        if(file.type.startsWith("image/")){

            const reader =
                new FileReader();

            reader.onload =
            function(event){

                addMessage(
                    `<img srctarget.result}`,
                    "user"
                );

                setTimeout(function(){

                    addMessage(
                        "✅ Image received successfully.",
                        "bot"
                    );

                },500);

            };

            reader.readAsDataURL(file);

        }else{

            addMessage(
                `📄 ${file.name}`,
                "user"
            );

            setTimeout(function(){

                addMessage(
                    "✅ File uploaded successfully.",
                    "bot"
                );

            },500);

        }

    }

    this.value = "";

});

</script>

</body>
</html>
