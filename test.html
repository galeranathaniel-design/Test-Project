<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaizen Board</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#2c323a;
    padding:20px;
}

.container{
    background:linear-gradient(90deg,#000d2a,#001338);
    padding:25px;
    border-radius:4px;
}

.title{
    color:#fff;
    font-size:48px;
    font-weight:700;
}

.subtitle{
    color:#c6ced8;
    font-size:20px;
    margin-top:10px;
    margin-bottom:25px;
}

.toolbar{
    display:flex;
    gap:12px;
    margin-bottom:20px;
}

.search{
    flex:1;
}

.search input,
.toolbar select{
    width:100%;
    height:42px;
    background:#222831;
    border:1px solid #4a5568;
    color:white;
    border-radius:4px;
    padding:0 12px;
}

.toolbar select{
    width:180px;
}

.add-btn{
    background:#0891b2;
    color:white;
    border:none;
    border-radius:5px;
    padding:0 20px;
    cursor:pointer;
    font-weight:600;
}

.add-btn:hover{
    background:#0e7490;
}

.board{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:24px;
}


.column{
    background:#20252c;
    border:1px solid #46505b;
    border-radius:10px;
    overflow:hidden;
    height:700px;
    display:flex;
    flex-direction:column;
}


.column-header{
    background:#1d2c37;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:sticky;
    top:0;
    z-index:10;
    flex-shrink:0;
}

.header-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.count{
    width:38px;
    height:38px;
    border-radius:50%;
    background:#0891b2;
    color:white;
    font-weight:bold;
    display:flex;
    justify-content:center;
    align-items:center;
}

.column-title{
    color:white;
    font-size:18px;
    font-weight:600;
}


.cards{
    padding:15px;
    flex:1;
    overflow-y:auto;
}

.cards::-webkit-scrollbar{
    width:8px;
}

.cards::-webkit-scrollbar-track{
    background:#1d2c37;
}

.cards::-webkit-scrollbar-thumb{
    background:#0891b2;
    border-radius:10px;
}

.cards::-webkit-scrollbar-thumb:hover{
    background:#0ea5c6;
}

.card{
    position:relative;
    background:#2d3640;
    color:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:8px;
    border-left:4px solid #0891b2;
    max-height:250px;
    overflow-y:auto;
}

.card::-webkit-scrollbar{
    width:6px;
}

.card::-webkit-scrollbar-track{
    background:#20252c;
}

.card::-webkit-scrollbar-thumb{
    background:#0891b2;
    border-radius:10px;
}

.card::-webkit-scrollbar-thumb:hover{
    background:#0ea5c6;
}


.card h4{
    margin-bottom:8px;
}

.card p{
    color:#d6dde5;
    font-size:14px;
    margin-bottom:8px;
}

.attachment{
    color:#7dd3fc;
    font-size:12px;
}

.edit-btn{
    position:absolute;
    top:10px;
    right:10px;
    width:32px;
    height:32px;
    border:none;
    border-radius:50%;
    background:#f59e0b;
    color:white;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:16px;
    transition:.2s;
}

.edit-btn:hover{
    background:#d97706;
    transform:scale(1.1);
}

.edit-btn:hover{
    background:#d97706;
}

/* Modal */

.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,.75);
    justify-content:center;
    align-items:center;
    z-index:999;
}

.modal-content{
    width:650px;
    max-width:95%;
    background:#20252c;
    border-radius:10px;
    overflow:hidden;
}

.modal-header{
    background:#1d2c37;
    padding:20px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.modal-header h2{
    color:white;
}

.close{
    color:white;
    cursor:pointer;
    font-size:28px;
}

.form-group{
    padding:15px 25px;
}

.form-group label{
    display:block;
    color:white;
    margin-bottom:8px;
}

.form-group input[type="text"],
.form-group textarea{
    width:100%;
    padding:10px;
    border:1px solid #46505b;
    background:#2d3640;
    color:white;
    border-radius:5px;
}

.form-group input[type="file"]{
    color:white;
}

#fileError{
    color:#f87171;
}

.modal-footer{
    padding:20px;
    display:flex;
    justify-content:flex-end;
    gap:10px;
}

.cancel-btn{
    background:#6b7280;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
}

.save-btn{
    background:#0891b2;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:5px;
    cursor:pointer;
}

@media(max-width:1000px){
    .board{
        grid-template-columns:1fr;
    }
}

</style>
</head>
<body>

<div class="container">

    <h1 class="title">Kaizen Board</h1>

    <p class="subtitle">
        Manage and monitor improvement items across stages
    </p>

    <div class="toolbar">

        <div class="search">
            <input type="text" placeholder="Search...">
        </div>

        <select>
            <option>All Branches</option>
            <option>Branch A</option>
            <option>Branch B</option>
        </select>

        <button class="add-btn" onclick="openModal()">
            + New Idea
        </button>

    </div>

    <div class="board">

        <!-- Ideas -->

        <div class="column">

            <div class="column-header">
                <div class="header-left">
                    <div class="count" id="ideasCount">0</div>
                    <div class="column-title">Ideas</div>
                </div>
            </div>

            <div class="cards" id="ideasCards"></div>

        </div>

        <!-- Approved -->

        <div class="column">

            <div class="column-header">
                <div class="header-left">
                    <div class="count">0</div>
                    <div class="column-title">Approved</div>
                </div>
            </div>

            <div class="cards"></div>

        </div>

        <!-- My Ideas -->

        <div class="column">

            <div class="column-header">
                <div class="header-left">
                    <div class="count" id="myIdeasCount">0</div>
                    <div class="column-title">My Ideas</div>
                </div>
            </div>

            <div class="cards" id="myIdeasCards"></div>

        </div>

    </div>

</div>

<!-- Modal -->

<div id="ideaModal" class="modal">

    <div class="modal-content">

        <div class="modal-header">
            <h2>Create Kaizen Idea</h2>
            <span class="close" onclick="closeModal()">&times;</span>
        </div>

        <form id="ideaForm">

            <div class="form-group">
                <label>Title of the Idea</label>
                <input type="text" id="ideaTitle" required>
            </div>

            <div class="form-group">
                <label>Description</label>
                <textarea id="ideaDescription" rows="5" required></textarea>
            </div>

            <div class="form-group">
                <label>Attachment (Max 10MB)</label>

                <input
                    type="file"
                    id="ideaAttachment"
                    accept=".jpg,.jpeg,.png,.gif,.pdf,.doc,.docx,.xls,.xlsx">

                <small id="fileError"></small>
            </div>

            <input type="hidden" id="editingId">

            <div class="modal-footer">

                <button type="button"
                        class="cancel-btn"
                        onclick="closeModal()">
                    Cancel
                </button>

                <button type="submit"
                        class="save-btn">
                    Save
                </button>

            </div>

        </form>

    </div>

</div>

<script>

function openModal(){
    document.getElementById('ideaModal').style.display='flex';
}

function closeModal(){

    document.getElementById('ideaModal').style.display='none';

    document.getElementById('ideaForm').reset();

    document.getElementById('editingId').value='';

    document.getElementById('fileError').innerText='';
}

window.onclick=function(event){

    const modal=document.getElementById('ideaModal');

    if(event.target===modal){
        closeModal();
    }
};

document.getElementById('ideaAttachment')
.addEventListener('change',function(){

    const file=this.files[0];

    if(!file) return;

    const maxSize=10*1024*1024;

    if(file.size>maxSize){

        document.getElementById('fileError').innerText=
        'File exceeds 10MB limit';

        this.value='';

    }else{

        document.getElementById('fileError').innerText='';
    }
});

document.getElementById('ideaForm')
.addEventListener('submit',function(e){

    e.preventDefault();

    const title=
    document.getElementById('ideaTitle').value;

    const desc=
    document.getElementById('ideaDescription').value;

    const file=
    document.getElementById('ideaAttachment').files[0];

    const editingId=
    document.getElementById('editingId').value;

    if(editingId){

        document
        .querySelectorAll(`[data-id="${editingId}"]`)
        .forEach(card=>{

            card.querySelector('.idea-title').innerText=title;
            card.querySelector('.idea-desc').innerText=desc;

            if(file){

                let attachment=
                card.querySelector('.attachment');

                if(!attachment){

                    attachment=
                    document.createElement('div');

                    attachment.className='attachment';

                    card.appendChild(attachment);
                }

                attachment.innerHTML='📎 '+file.name;
            }

        });

    }else{

        const id=Date.now();

        createCard(
            'ideasCards',
            id,
            title,
            desc,
            file,
            false
        );

        createCard(
            'myIdeasCards',
            id,
            title,
            desc,
            file,
            true
        );
    }

    updateCounters();

    closeModal();

});

function createCard(container,id,title,desc,file,showEdit){

    const card=document.createElement('div');

    card.className='card';

    card.setAttribute('data-id',id);

    card.innerHTML=`
        <h4 class="idea-title">${title}</h4>
        <p class="idea-desc">${desc}</p>

        ${file ? `
        <div class="attachment">
            📎 ${file.name}
        </div>
        ` : ''}

       ${showEdit ? `
<button
    class="edit-btn"
    onclick="editIdea('${id}')"
    title="Edit Idea">
    ✏️
</button>
` : ''}
    `;

    document.getElementById(container)
    .appendChild(card);
}

function editIdea(id){

    const card=
    document.querySelector(
        '#myIdeasCards .card[data-id="'+id+'"]'
    );

    document.getElementById('ideaTitle').value=
    card.querySelector('.idea-title').innerText;

    document.getElementById('ideaDescription').value=
    card.querySelector('.idea-desc').innerText;

    document.getElementById('editingId').value=id;

    openModal();
}

function updateCounters(){

    document.getElementById('ideasCount').innerText=
    document.querySelectorAll('#ideasCards .card').length;

    document.getElementById('myIdeasCount').innerText=
    document.querySelectorAll('#myIdeasCards .card').length;
}

updateCounters();

</script>

</body>
</html>
